name: Check WordPress for New Posts

on:
  schedule:
    - cron: '17 */6 * * *'  # Every 6 hours
  workflow_dispatch: # Allow manual trigger

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Check for new WordPress posts
        id: check
        run: |
          # Fetch the latest post from WordPress
          LATEST=$(curl -s "https://public-api.wordpress.com/rest/v1.1/sites/itstartswiththestars.wordpress.com/posts/?number=1&fields=ID,title,date,slug" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          posts = data.get('posts', [])
          if posts:
              p = posts[0]
              print(f\"POST_ID={p['ID']}\")
              print(f\"POST_TITLE={p['title']}\")
              print(f\"POST_SLUG={p['slug']}\")
              print(f\"POST_DATE={p['date']}\")
          ")

          # Export to GitHub env
          echo "$LATEST" >> $GITHUB_OUTPUT

          # Check if this post is from the last 7 hours (6hr interval + 1hr buffer)
          LATEST_DATE=$(echo "$LATEST" | grep POST_DATE | cut -d= -f2)
          IS_NEW=$(python3 -c "
          from datetime import datetime, timezone, timedelta
          try:
              post_date = datetime.fromisoformat('$LATEST_DATE'.replace('Z','+00:00'))
              cutoff = datetime.now(timezone.utc) - timedelta(hours=7)
              print('true' if post_date > cutoff else 'false')
          except:
              print('false')
          ")
          echo "IS_NEW=$IS_NEW" >> $GITHUB_OUTPUT

      - name: Trigger Netlify rebuild
        if: steps.check.outputs.IS_NEW == 'true'
        run: |
          curl -s -X POST https://api.netlify.com/build_hooks/69dc4c0bc6dbb473b5f92200

      - name: Email George the new post link
        if: steps.check.outputs.IS_NEW == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "New post is live: ${{ steps.check.outputs.POST_TITLE }}"
          to: Hawaiigeorge1@hotmail.com
          from: It Starts With The Stars <noreply@itstartswiththestars.com>
          body: |
            Hi George,

            Your new post "${{ steps.check.outputs.POST_TITLE }}" is now live on your website!

            Here's the link to share:
            https://itstartswiththestars.com/blog/${{ steps.check.outputs.POST_SLUG }}/

            You can also always share the main blog page:
            https://itstartswiththestars.com/blog/

            - Your Website Bot
